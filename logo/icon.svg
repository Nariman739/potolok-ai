<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80">
  <rect width="80" height="80" rx="18" fill="#1B3FE4"/>

  <!-- P: стержень -->
  <rect x="16" y="12" width="12" height="56" rx="6" fill="white"/>

  <!-- P: чаша стартует с y=18 — где стержень становится прямым (конец rx=6 скругления) -->
  <!-- Это убирает "зазор" на стыке дуги и стержня -->
  <path d="M28 18 C64 18 64 50 28 50"
        fill="none" stroke="white" stroke-width="13"
        stroke-linecap="round"/>

  <!-- Молния: центр чаши ≈ x=38, y=34 — выровнена по центру -->
  <path d="M42 26 L37 34 L42 34 L37 43"
        stroke="#FF6B35" stroke-width="4"
        stroke-linecap="round" stroke-linejoin="round"
        fill="none"/>
</svg>
