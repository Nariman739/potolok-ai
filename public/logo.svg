<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40" fill="none">
  <!-- Background rounded square -->
  <rect width="40" height="40" rx="10" fill="url(#bg)"/>

  <!-- Ceiling surface (stretched fabric) — subtle curve at top -->
  <path d="M8 12 Q20 8 32 12" stroke="url(#accent)" stroke-width="2" stroke-linecap="round" fill="none" opacity="0.6"/>

  <!-- Letter P — bold, modern -->
  <path d="M14 30V14h6.5a5.5 5.5 0 0 1 0 11H14" stroke="white" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

  <!-- LED spot light dot -->
  <circle cx="29" cy="28" r="2.5" fill="url(#accent)"/>
  <circle cx="29" cy="28" r="4.5" fill="url(#accent)" opacity="0.2"/>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="40" y2="40">
      <stop offset="0%" stop-color="#0F1724"/>
      <stop offset="100%" stop-color="#1a2d4a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="40" y2="40">
      <stop offset="0%" stop-color="#F97316"/>
      <stop offset="100%" stop-color="#FB923C"/>
    </linearGradient>
  </defs>
</svg>
